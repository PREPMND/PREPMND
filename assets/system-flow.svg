<svg width="1100" height="320" viewBox="0 0 1100 320"
xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020617"/>
    <stop offset="55%" stop-color="#071426"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>

  <linearGradient id="jwt" x1="0" x2="1">
    <stop offset="0%" stop-color="#a855f7"/>
    <stop offset="50%" stop-color="#ec4899"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>

  <linearGradient id="socket" x1="0" x2="1">
    <stop offset="0%" stop-color="#2563eb"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- BACKGROUND -->

<rect width="1100" height="320" rx="24" fill="url(#bg)"/>

<rect
x="1"
y="1"
width="1098"
height="318"
rx="23"
fill="none"
stroke="#1e3a5f"
stroke-width="2"
/>

<!-- WINDOW HEADER -->

<circle cx="30" cy="28" r="6" fill="#ef4444"/>
<circle cx="52" cy="28" r="6" fill="#eab308"/>
<circle cx="74" cy="28" r="6" fill="#22c55e"/>

<text
x="550"
y="34"
text-anchor="middle"
font-family="Courier New, monospace"
font-size="13"
fill="#64748b">
PREYTWEET // BACKEND EVENTS
</text>

<circle cx="1015" cy="28" r="5" fill="#22c55e">
  <animate
    attributeName="opacity"
    values="0.3;1;0.3"
    dur="2s"
    repeatCount="indefinite"
  />
</circle>

<text
x="1030"
y="33"
font-family="Courier New, monospace"
font-size="12"
font-weight="700"
fill="#22c55e">
LIVE
</text>

<line
x1="0"
y1="55"
x2="1100"
y2="55"
stroke="#1e293b"
/>


<!-- ================================================= -->
<!-- REDIS -->
<!-- ================================================= -->

<g opacity="0">

  <animate
    attributeName="opacity"
    values="0;1;1;0;0"
    keyTimes="0;0.03;0.22;0.25;1"
    dur="24s"
    repeatCount="indefinite"
  />

  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 5;0 -5;0 5"
      dur="4s"
      repeatCount="indefinite"
    />

    <rect
    x="90"
    y="91"
    width="140"
    height="135"
    rx="25"
    fill="#19090d"
    stroke="#ef4444"
    stroke-width="2"
    />

    <ellipse
    cx="160"
    cy="125"
    rx="43"
    ry="15"
    fill="#fb7185"
    filter="url(#glow)"
    />

    <ellipse
    cx="160"
    cy="148"
    rx="43"
    ry="15"
    fill="#dc2626"
    />

    <ellipse
    cx="160"
    cy="171"
    rx="43"
    ry="15"
    fill="#991b1b"
    />

    <text
    x="160"
    y="205"
    text-anchor="middle"
    font-family="Courier New, monospace"
    font-size="15"
    font-weight="700"
    fill="#fb7185">
    REDIS
    </text>
  </g>

  <text
  x="290"
  y="116"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#fb7185">
  REDIS / CACHE LAYER
  </text>

  <text
  x="290"
  y="158"
  font-family="Courier New, monospace"
  font-size="25"
  font-weight="700"
  fill="#f8fafc">
  CACHE HIT
  </text>

  <text
  x="290"
  y="191"
  font-family="Courier New, monospace"
  font-size="16"
  fill="#94a3b8">
  Response served without querying MongoDB
  </text>

  <text
  x="290"
  y="220"
  font-family="Courier New, monospace"
  font-size="13"
  fill="#64748b">
  latency path :: redis → response
  </text>

  <circle cx="910" cy="157" r="10" fill="#ef4444" filter="url(#glow)">
    <animate
      attributeName="r"
      values="7;12;7"
      dur="2s"
      repeatCount="indefinite"
    />
  </circle>

  <text
  x="940"
  y="163"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#fb7185">
  CACHE_HIT
  </text>

</g>


<!-- ================================================= -->
<!-- RATE LIMITER -->
<!-- ================================================= -->

<g opacity="0">

  <animate
    attributeName="opacity"
    values="0;0;1;1;0;0"
    keyTimes="0;0.25;0.28;0.47;0.5;1"
    dur="24s"
    repeatCount="indefinite"
  />

  <circle
  cx="160"
  cy="157"
  r="68"
  fill="#190708"
  stroke="#ef4444"
  stroke-width="2"
  />

  <circle
  cx="160"
  cy="157"
  r="53"
  fill="none"
  stroke="#7f1d1d"
  stroke-width="2"
  stroke-dasharray="8 8">

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 160 157"
      to="360 160 157"
      dur="8s"
      repeatCount="indefinite"
    />

  </circle>

  <text
  x="160"
  y="170"
  text-anchor="middle"
  font-family="Courier New, monospace"
  font-size="52"
  font-weight="700"
  fill="#ef4444"
  filter="url(#glow)">
  429
  </text>

  <text
  x="290"
  y="116"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#f87171">
  EXPRESS / RATE LIMITER
  </text>

  <text
  x="290"
  y="158"
  font-family="Courier New, monospace"
  font-size="25"
  font-weight="700"
  fill="#f8fafc">
  REQUEST BLOCKED
  </text>

  <text
  x="290"
  y="191"
  font-family="Courier New, monospace"
  font-size="16"
  fill="#94a3b8">
  Request threshold exceeded for the active window
  </text>

  <text
  x="290"
  y="220"
  font-family="Courier New, monospace"
  font-size="13"
  fill="#64748b">
  HTTP 429 :: traffic control engaged
  </text>

  <circle cx="910" cy="157" r="10" fill="#ef4444">
    <animate
      attributeName="opacity"
      values="0.3;1;0.3"
      dur="1.4s"
      repeatCount="indefinite"
    />
  </circle>

  <text
  x="940"
  y="163"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#f87171">
  LIMITED
  </text>

</g>


<!-- ================================================= -->
<!-- JWT -->
<!-- ================================================= -->

<g opacity="0">

  <animate
    attributeName="opacity"
    values="0;0;1;1;0;0"
    keyTimes="0;0.5;0.53;0.72;0.75;1"
    dur="24s"
    repeatCount="indefinite"
  />

  <circle
  cx="160"
  cy="157"
  r="68"
  fill="#10091b"
  stroke="#a855f7"
  stroke-width="2"
  />

  <circle
  cx="160"
  cy="157"
  r="50"
  fill="none"
  stroke="url(#jwt)"
  stroke-width="4"
  stroke-dasharray="5 8">

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 160 157"
      to="360 160 157"
      dur="7s"
      repeatCount="indefinite"
    />

  </circle>

  <text
  x="160"
  y="153"
  text-anchor="middle"
  font-family="Courier New, monospace"
  font-size="27"
  font-weight="700"
  fill="#f8fafc">
  JWT
  </text>

  <text
  x="160"
  y="180"
  text-anchor="middle"
  font-family="Courier New, monospace"
  font-size="12"
  fill="#c084fc">
  ACCESS
  </text>

  <text
  x="290"
  y="116"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#c084fc">
  AUTH / TOKEN FLOW
  </text>

  <text
  x="290"
  y="158"
  font-family="Courier New, monospace"
  font-size="25"
  font-weight="700"
  fill="#f8fafc">
  ACCESS TOKEN EXPIRED
  </text>

  <text
  x="290"
  y="191"
  font-family="Courier New, monospace"
  font-size="16"
  fill="#94a3b8">
  Refresh token → new access token → retry request
  </text>

  <text
  x="290"
  y="220"
  font-family="Courier New, monospace"
  font-size="13"
  fill="#64748b">
  axios interceptor :: authentication recovered
  </text>

  <circle cx="910" cy="157" r="10" fill="#a855f7" filter="url(#glow)">
    <animate
      attributeName="opacity"
      values="0.3;1;0.3"
      dur="1.7s"
      repeatCount="indefinite"
    />
  </circle>

  <text
  x="940"
  y="163"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#c084fc">
  RETRY
  </text>

</g>


<!-- ================================================= -->
<!-- SOCKET.IO -->
<!-- ================================================= -->

<g opacity="0">

  <animate
    attributeName="opacity"
    values="0;0;1;1;0"
    keyTimes="0;0.75;0.78;0.97;1"
    dur="24s"
    repeatCount="indefinite"
  />

  <circle
  cx="160"
  cy="157"
  r="68"
  fill="#071522"
  stroke="#22d3ee"
  stroke-width="2"
  />

  <circle
  cx="160"
  cy="157"
  r="50"
  fill="none"
  stroke="url(#socket)"
  stroke-width="4">

    <animate
      attributeName="r"
      values="45;54;45"
      dur="2.5s"
      repeatCount="indefinite"
    />

    <animate
      attributeName="opacity"
      values="0.4;1;0.4"
      dur="2.5s"
      repeatCount="indefinite"
    />

  </circle>

  <text
  x="160"
  y="153"
  text-anchor="middle"
  font-family="Courier New, monospace"
  font-size="27"
  font-weight="700"
  fill="#f8fafc">
  IO
  </text>

  <text
  x="160"
  y="180"
  text-anchor="middle"
  font-family="Courier New, monospace"
  font-size="12"
  fill="#22d3ee">
  SOCKET
  </text>

  <text
  x="290"
  y="116"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#22d3ee">
  SOCKET.IO / CONVERSATION ROOM
  </text>

  <text
  x="290"
  y="158"
  font-family="Courier New, monospace"
  font-size="25"
  font-weight="700"
  fill="#f8fafc">
  MESSAGE DELIVERED
  </text>

  <text
  x="290"
  y="191"
  font-family="Courier New, monospace"
  font-size="16"
  fill="#94a3b8">
  Event emitted to the active conversation room
  </text>

  <text
  x="290"
  y="220"
  font-family="Courier New, monospace"
  font-size="13"
  fill="#64748b">
  room event :: persistent message flow
  </text>

  <circle cx="910" cy="157" r="10" fill="#22c55e" filter="url(#glow)">
    <animate
      attributeName="r"
      values="7;12;7"
      dur="1.8s"
      repeatCount="indefinite"
    />
  </circle>

  <text
  x="940"
  y="163"
  font-family="Courier New, monospace"
  font-size="15"
  font-weight="700"
  fill="#4ade80">
  DELIVERED
  </text>

</g>


<!-- FOOTER -->

<text
x="35"
y="292"
font-family="Courier New, monospace"
font-size="11"
fill="#475569">
SYSTEM EVENT STREAM
</text>

<line
x1="180"
y1="288"
x2="1060"
y2="288"
stroke="#1e293b"
stroke-dasharray="4 6"
/>

</svg>
