<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0B0B0F"/>
<stop offset="100%" stop-color="#17181D"/>
</linearGradient>
<linearGradient id="acc" x1="0%" x2="100%">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="50%" stop-color="#14B8A6"/>
<stop offset="100%" stop-color="#F97316"/>
</linearGradient>
<style>
.t{font:700 28px 'Segoe UI',Arial;fill:#FAFAFA}
.h{font:600 18px 'Segoe UI',Arial;fill:#D4D4D8}
.b{font:16px 'Segoe UI',Arial;fill:#A1A1AA}
</style>
</defs>
<rect width="1000" height="540" rx="28" fill="url(#bg)"/>
